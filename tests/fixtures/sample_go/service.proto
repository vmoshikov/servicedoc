syntax = "proto3";

package sample.v1;

option go_package = "github.com/example/sample-service/proto/v1";

// UserService предоставляет операции управления пользователями.
service UserService {
  // GetUser возвращает пользователя по ID.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // CreateUser создаёт нового пользователя.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);

  // DeleteUser выполняет мягкое удаление пользователя.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  // ListUsers возвращает поток пользователей.
  rpc ListUsers(ListUsersRequest) returns (stream UserResponse);
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  UserResponse user = 1;
}

message CreateUserRequest {
  string username = 1;
  string email = 2;
  string role = 3;
}

message CreateUserResponse {
  string user_id = 1;
  string created_at = 2;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}

message ListUsersRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message UserResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  string created_at = 5;
}
